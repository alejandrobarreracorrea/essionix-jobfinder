name: jobfinder
on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 07:00 Colombia (GMT-5)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - name: Run jobfinder
        env:
          # Token de suscripción (Max) generado con `claude setup-token`.
          # OJO: NO definir ANTHROPIC_API_KEY aquí — tiene prioridad sobre el token.
          CLAUDE_CODE_OAUTH_TOKEN_RAW: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: |
          # Limpiar espacios/saltos de línea que se cuelan al pegar el secret
          # (un header HTTP no admite \n → "Header has invalid value").
          export CLAUDE_CODE_OAUTH_TOKEN="$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN_RAW" | tr -d '[:space:]')"
          npm start
      - name: Commit estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/seen.json
          git diff --staged --quiet || git commit -m "chore: actualizar estado seen.json"
          git push
