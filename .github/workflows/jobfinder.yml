name: jobfinder
on:
  schedule:
    - cron: "0 12 * * *"   # 12:00 UTC = 07:00 Colombia (GMT-5)
  workflow_dispatch:
    inputs:
      max_score:
        description: "Límite de ofertas a puntuar (debug). Vacío = todas."
        required: false
        default: ""
      debug:
        description: "Logs verbosos del agente (1 = on)."
        required: false
        default: ""
      test_email:
        description: "Enviar un email de prueba y salir (1 = on)."
        required: false
        default: ""
      liveness_probe:
        description: "Probar verificación de liveness y salir (1 = on)."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test
      - name: Run jobfinder
        env:
          # Token de suscripción (Max) generado con `claude setup-token`.
          # OJO: NO definir ANTHROPIC_API_KEY aquí — tiene prioridad sobre el token.
          CLAUDE_CODE_OAUTH_TOKEN_RAW: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          JOBFINDER_MAX_SCORE: ${{ inputs.max_score }}
          JOBFINDER_DEBUG: ${{ inputs.debug }}
          JOBFINDER_TEST_EMAIL: ${{ inputs.test_email }}
          JOBFINDER_LIVENESS_PROBE: ${{ inputs.liveness_probe }}
        run: |
          # Limpiar espacios/saltos de línea que se cuelan al pegar el secret
          # (un header HTTP no admite \n → "Header has invalid value").
          export CLAUDE_CODE_OAUTH_TOKEN="$(printf '%s' "$CLAUDE_CODE_OAUTH_TOKEN_RAW" | tr -d '[:space:]')"
          npm start
      - name: Commit estado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/
          git diff --staged --quiet || git commit -m "chore: actualizar estado (seen + sources)"
          git push
